<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangerine - Filtrlangan Cheklar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --tangerine: #F28500; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); font-family: 'Inter', sans-serif; }
        
        .navbar { background-color: white !important; border-bottom: 3px solid var(--tangerine); }
        .navbar-brand { color: var(--tangerine) !important; font-weight: 900; }

        /* Qidiruv paneli */
        .filter-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .filter-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        
        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #eee;
            background-color: #fcfcfc;
        }
        .form-control:focus { border-color: var(--tangerine); box-shadow: 0 0 0 0.25rem rgba(242, 133, 0, 0.05); }

        .btn-filter {
            background: var(--tangerine);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            border: none;
            width: 100%;
            transition: 0.3s;
        }
        .btn-filter:hover { background: #d67600; }

        /* Chek natijalari */
        .receipt-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #efefef;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .receipt-info { display: flex; align-items: center; gap: 15px; }
        .receipt-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        @media (max-width: 768px) {
            .receipt-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .receipt-action { width: 100%; text-align: right; }
        }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fs-3" href="#">TANGERINE</a>
            <span class="badge bg-light text-dark border">Arxiv</span>
        </div>
    </nav>

    <div class="container my-4">
        
        <div class="filter-section">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="filter-label">Mijoz PINFL</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-person-vcard"></i></span>
                        <input type="text" class="form-control border-start-0" placeholder="00000000000000" maxlength="14">
                    </div>
                </div>

                <div class="col-md-3 col-6">
                    <label class="filter-label">Dan (sana)</label>
                    <input type="date" class="form-control" id="dateFrom">
                </div>
                <div class="col-md-3 col-6">
                    <label class="filter-label">Gacha (sana)</label>
                    <input type="date" class="form-control" id="dateTo">
                </div>

                <div class="col-md-2 align-self-end">
                    <button class="btn-filter">
                        <i class="bi bi-funnel-fill me-2"></i> IZLASH
                    </button>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3 px-2">
            <h6 class="fw-bold m-0">Topilgan cheklar: <span class="text-warning">24 ta</span></h6>
            <button class="btn btn-sm btn-outline-dark rounded-pill px-3"><i class="bi bi-file-earmark-excel me-1"></i> Excelga olish</button>
        </div>

        <div class="receipt-list">
            <div class="receipt-card shadow-sm">
                <div class="receipt-info">
                    <div class="receipt-icon bg-success bg-opacity-10 text-success">
                        <i class="bi bi-receipt"></i>
                    </div>
                    <div>
                        <div class="fw-bold mb-0">#CHK-10042 • 1,250,000 UZS</div>
                        <div class="small text-muted">21.04.2026 | PINFL: 3120594XXXXXXX</div>
                    </div>
                </div>
                <div class="receipt-action">
                    <span class="badge bg-light text-dark border me-2">Karta</span>
                    <button class="btn btn-sm btn-warning text-white rounded-3"><i class="bi bi-eye"></i></button>
                </div>
            </div>

            <div class="receipt-card shadow-sm">
                <div class="receipt-info">
                    <div class="receipt-icon bg-primary bg-opacity-10 text-primary">
                        <i class="bi bi-receipt"></i>
                    </div>
                    <div>
                        <div class="fw-bold mb-0">#CHK-10038 • 850,000 UZS</div>
                        <div class="small text-muted">19.04.2026 | PINFL: 3120594XXXXXXX</div>
                    </div>
                </div>
                <div class="receipt-action">
                    <span class="badge bg-light text-dark border me-2">Naqd</span>
                    <button class="btn btn-sm btn-warning text-white rounded-3"><i class="bi bi-eye"></i></button>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
