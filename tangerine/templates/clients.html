<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangerine - Mijozlar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --tangerine: #F28500; }
        body { background-color: #f4f7f6; }
        
        /* NAVBAR (Sening universal sxemang) */
        .navbar { background-color: white !important; border-bottom: 3px solid var(--tangerine); }
        .navbar-brand { color: var(--tangerine) !important; font-weight: 900; letter-spacing: 1px; }

        .search-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .content-card {
            background: white;
            border-radius: 20px;
            padding: 10px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .client-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            transition: 0.2s;
        }
        .client-item:hover { background-color: #fffcf9; }
        .client-item:last-child { border-bottom: none; }

        .btn-add-client {
            background-color: var(--tangerine);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 10px 20px;
            border: none;
            transition: 0.3s;
        }
        .btn-add-client:hover { background-color: #d67600; color: white; }

        @media (max-width: 768px) {
            .desktop-header { display: none; }
            .btn-add-client { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

    {% include 'navbar.html' %}

    <div class="container my-4">
        
        <div class="search-section">
            <div class="row align-items-center g-3">
                <div class="col-md-7">
                    <form method="get" class="input-group">
                        <span class="input-group-text bg-white border-warning text-warning"><i class="bi bi-search"></i></span>
                        <input type="search" value="{{query}}" name="pinfl" class="form-control border-warning border-start-0" placeholder="PINFL">
                        <button class="btn btn-add-client shadow-sm" type="submit">
                            <i class="bi bi-person-fill me-2"></i>IZLASH
                        </button>
                    </form>
                </div>
                <div class="col-md-5 text-md-end">
                    <a href="{% url 'add_client' %}" class="btn btn-add-client shadow-sm">
                        <i class="bi bi-person-plus-fill me-2"></i>MIJOZ QO'SHISH
                    </a>
                </div>
            </div>
        </div>

        <div class="content-card">
            <div class="row desktop-header py-3 border-bottom fw-bold text-muted small text-uppercase">
                <div class="col-md-5">Mijoz va Manzil</div>
                <div class="col-md-3 text-center">JSHSHIR</div>
                <div class="col-md-3 text-center">Telefon raqami</div>
                <div class="col-md-1 text-end">Batafsil</div>
            </div>

            <div id="clients-list">
                {% for i in clients %}
                <div class="client-item">
                    <div class="row align-items-center g-2">
                        <div class="col-md-5">
                            <div class="fw-bold text-dark fs-6">{{i.full_name}}</div>
                            <small class="text-muted"><i class="bi bi-geo-alt me-1"></i>Filial name</small>
                        </div>
                        <div class="col-md-3 text-md-center">
                            <span class="d-md-none text-muted small fw-bold">JSHSHIR: </span>
                            <code class="text-dark fw-bold">{{i.passport_pinfl}}</code>
                        </div>
                        <div class="col-md-3 text-md-center">
                            <span class="d-md-none text-muted small fw-bold">TEL: </span>
                            <a href="tel:+998901234567" class="text-decoration-none text-dark fw-bold">{{i.numbers.all.0.number}}</a>
                        </div>
                        <div class="col-md-1 text-end">
                            <a href="{% url 'client' i.id %}" class="btn btn-sm btn-outline-warning rounded-pill px-3"><i class="bi bi-chevron-right"></i></a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
