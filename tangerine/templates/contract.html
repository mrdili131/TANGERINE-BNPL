<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangerine - Shartnoma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --tangerine: #F28500; }
        body { background-color: #f4f7f6; }
        
        /* NAVBAR (O'zgarmas sxema) */
        .navbar { background-color: white !important; border-bottom: 3px solid var(--tangerine); }
        .navbar-brand { color: var(--tangerine) !important; font-weight: 900; letter-spacing: 1px; }

        .form-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }

        /* MAHSULOT BLOKI */
        .product-item {
            background-color: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #dee2e6;
            position: relative;
        }

        .btn-add {
            border: 2px dashed var(--tangerine);
            color: var(--tangerine);
            font-weight: bold;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: transparent;
            transition: 0.3s;
        }
        .btn-add:hover { background-color: var(--tangerine); color: white; }

        .total-section { background: #212529; color: white; border-radius: 20px; padding: 25px; position: sticky; top: 100px; }
        .limit-info { background: white; border-radius: 15px; padding: 15px; border-left: 5px solid #198754; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    {% include 'navbar.html' %}

    <div class="container my-4">
        <div class="row g-4">
            
            <div class="col-lg-8">
                <div class="form-card">
                    <h5 class="fw-bold mb-4 text-uppercase"><i class="bi bi-cart-plus me-2 text-warning"></i>1. Mahsulotlar</h5>
                    
                    <div id="product-container">
                        <div class="product-item">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Maxsulot nomi</label>
                                    <input type="text" class="form-control border-warning" placeholder="Nomini kiriting">
                                </div>
                                <div class="col-6 col-md-3">
                                    <label class="form-label small fw-bold">Nechtaligi</label>
                                    <input type="number" class="form-control border-warning" value="1" min="1">
                                </div>
                                <div class="col-6 col-md-3">
                                    <label class="form-label small fw-bold">Summasi</label>
                                    <input type="number" class="form-control border-warning" placeholder="0">
                                </div>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-add" onclick="addProduct()">
                        <i class="bi bi-plus-lg me-2"></i>YANA MAHSULOT QO'SHISH
                    </button>
                </div>

                <div class="form-card">
                    <h5 class="fw-bold mb-4 text-uppercase"><i class="bi bi-gear-fill me-2 text-warning"></i>2. To'lov shartlari</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">To‘lov sanasi</label>
                            <input type="number" class="form-control border-warning" placeholder="0">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="limit-info mb-4 text-center">
                    <div class="small text-muted text-uppercase fw-bold">Mavjud limit</div>
                    <div class="h4 fw-bold m-0 text-success">25,000,000 so'm</div>
                </div>

                <div class="total-section shadow-lg">
                    <h5 class="fw-bold border-bottom border-secondary pb-3 mb-3 text-warning text-center">HISOB-KITOB</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Jami:</span>
                        <span class="fw-bold">0 so'm</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2 text-danger">
                        <span>Boshlang'ich:</span>
                        <span>- 0 so'm</span>
                    </div>
                    <hr class="border-secondary">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="h6 m-0">Kredit:</span>
                        <span class="h4 fw-bold text-info">0 so'm</span>
                    </div>
                    <button class="btn btn-warning text-white w-100 py-3 fw-bold rounded-3">YARATISH</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function addProduct() {
            const container = document.getElementById('product-container');
            const newItem = document.createElement('div');
            newItem.className = 'product-item';
            newItem.innerHTML = `
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Maxsulot nomi</label>
                        <input type="text" class="form-control border-warning" placeholder="Nomini kiriting">
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label small fw-bold">Nechtaligi</label>
                        <input type="number" class="form-control border-warning" value="1" min="1">
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label small fw-bold">Summasi</label>
                        <input type="number" class="form-control border-warning" placeholder="0">
                    </div>
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-2" onclick="this.parentElement.remove()"></button>
                </div>
            `;
            container.appendChild(newItem);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
