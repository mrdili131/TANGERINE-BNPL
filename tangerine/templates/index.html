<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangerine - Bootstrap Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --tangerine: #F28500;
        }
        body {
            background-color: #f4f7f6;
        }
        /* Navbar custom style */
        .navbar {
            background-color: white !important;
            border-bottom: 3px solid var(--tangerine);
        }
        .navbar-brand {
            color: var(--tangerine) !important;
            font-weight: 900;
            letter-spacing: 1px;
        }
        /* Card custom styles */
        .btn-main-action {
            height: 100%;
            min-height: 350px;
            background-color: var(--tangerine);
            color: white;
            border: none;
            border-radius: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .btn-main-action:hover {
            background-color: #d67600;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(242, 133, 0, 0.3);
            color: white;
        }
        .btn-sub-action {
            height: 165px;
            background-color: white;
            color: #333;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .btn-sub-action:hover {
            border-color: var(--tangerine);
            color: var(--tangerine);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .icon-lg {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .icon-md {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    {% include 'navbar.html' %}

    <div class="container my-5">
        <div class="row g-4">
            
            <div class="col-md-7">
                <a href="{% url 'add_client' %}" class="btn btn-main-action p-5 shadow-sm text-decoration-none">
                    <i class="bi bi-person-plus-fill icon-lg"></i>
                    <h2 class="fw-bold">Mijoz qo‘shish</h2>
                    <p class="opacity-75">Yangi kredit arizasini rasmiylashtirishni boshlang</p>
                </a>
            </div>

            <div class="col-md-5">
                <div class="d-flex flex-column gap-4 h-100">
                    
                    <a href="{% url 'contracts' %}" class="btn btn-sub-action shadow-sm text-decoration-none">
                        <i class="bi bi-file-earmark-pdf-fill icon-md text-warning"></i>
                        <h4 class="fw-bold m-0">Hujjatlar</h4>
                        <p class="small text-muted m-0">Shartnomalar va aktlar</p>
                    </a>

                    <a href="{% url 'clients' %}" class="btn btn-sub-action shadow-sm text-decoration-none">
                        <i class="bi bi-people-fill icon-md text-warning"></i>
                        <h4 class="fw-bold m-0">Mijozlar</h4>
                        <p class="small text-muted m-0">Mavjud baza va statuslar</p>
                    </a>
                    
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
