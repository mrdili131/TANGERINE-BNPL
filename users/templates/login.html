<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangerine - Tizimga kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --tangerine: #F28500; --dark-blue: #1e293b; }
        
        body { 
            background: linear-gradient(135deg, #fff5e6 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(242, 133, 0, 0.1);
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--tangerine);
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .form-floating > .form-control {
            border-radius: 15px;
            border: 1.5px solid #e2e8f0;
            background-color: #f8fafc;
        }

        .form-floating > .form-control:focus {
            border-color: var(--tangerine);
            box-shadow: 0 0 0 4px rgba(242, 133, 0, 0.1);
            background-color: white;
        }

        .btn-login {
            background: var(--tangerine);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(242, 133, 0, 0.2);
        }

        .btn-login:hover {
            background: #d67600;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(242, 133, 0, 0.3);
        }

        .input-group-text {
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                border-radius: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">TANGERINE</div>
        <br>

        <form id="loginForm" method="post">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="username" placeholder="Login" required>
                <label for="username">Foydalanuvchi nomi</label>
            </div>

            <div class="form-floating mb-4 position-relative">
                <input type="password" name="password" class="form-control" id="password" placeholder="Parol" required>
                <label for="password">Parol</label>
                <span class="position-absolute top-50 end-0 translate-middle-y me-3 mt-1 cursor-pointer" onclick="togglePassword()">
                    <i class="bi bi-eye" id="toggleIcon"></i>
                </span>
            </div>


            <button type="submit" class="btn btn-login">
                KIRISH <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 FIN-TANGERINE GROUP <br> Barcha huquqlar himoyalangan
        </div>
    </div>

    <script>
        // Parolni ko'rsatish/yashirish funksiyasi
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
